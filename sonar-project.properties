# hAIve monorepo — analyse SonarQube (serveur self-hosted)
# Crée un projet dans SonarQube avec la même clé (sonar.projectKey) avant la première analyse.

sonar.projectKey=haive
sonar.projectName=hAIve

sonar.sourceEncoding=UTF-8

# Code applicatif (monorepo packages + scripts utilitaires)
sonar.sources=packages,scripts

sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/out/**,**/engram/**,**/sandaga_monorepo/**,**/sandaga-monorepo/**,**/*.vsix,**/benchmark-results/**,**/.ai/**
