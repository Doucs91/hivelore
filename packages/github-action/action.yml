name: "hAIve PR Memory Check"
description: >
  Scans a pull request for relevant hAIve memories and posts a comment
  surfacing gotchas, conventions, and action_required items for the changed files.
  Helps reviewers and AI agents spot non-obvious constraints before they cause bugs.

author: "hiveai"

branding:
  icon: "book-open"
  color: "purple"

inputs:
  github-token:
    description: "GitHub token with pull-requests:write permission. Use secrets.GITHUB_TOKEN."
    required: true
  haive-version:
    description: "Version of @hiveai/cli to install (default: latest)."
    required: false
    default: "latest"
  comment-header:
    description: "Custom header for the PR comment."
    required: false
    default: "## 🧠 hAIve — Team Memory Check"
  post-if-empty:
    description: "Post a comment even when no memories are found (shows a clean bill of health)."
    required: false
    default: "false"
  max-memories:
    description: "Maximum number of memories to include per file (default: 10)."
    required: false
    default: "10"
  memories-dir:
    description: "Path to memories directory relative to workspace root."
    required: false
    default: ".ai/memories"

outputs:
  memories-found:
    description: "Number of unique memories surfaced across all changed files."
    value: ${{ steps.run.outputs.memories_found }}
  action-required-count:
    description: "Number of memories with requires_human_approval: true."
    value: ${{ steps.run.outputs.action_required_count }}
  comment-url:
    description: "URL of the posted PR comment."
    value: ${{ steps.run.outputs.comment_url }}

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install hAIve CLI
      shell: bash
      run: npm install -g @hiveai/cli@${{ inputs.haive-version }} --silent 2>/dev/null || true

    - name: Get changed files
      id: changed
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { data: files } = await github.rest.pulls.listFiles({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.payload.pull_request.number,
            per_page: 100,
          });
          const paths = files
            .filter(f => f.status !== 'removed')
            .map(f => f.filename);
          core.setOutput('files', paths.join('\n'));
          core.setOutput('files_csv', paths.join(','));
          console.log(`Changed files (${paths.length}): ${paths.slice(0,5).join(', ')}${paths.length > 5 ? '…' : ''}`);

    - name: Run hAIve memory check
      id: run
      shell: bash
      env:
        CHANGED_FILES: ${{ steps.changed.outputs.files }}
        COMMENT_HEADER: ${{ inputs.comment-header }}
        POST_IF_EMPTY: ${{ inputs.post-if-empty }}
        MAX_MEMORIES: ${{ inputs.max-memories }}
        MEMORIES_DIR: ${{ inputs.memories-dir }}
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: node ${{ github.action_path }}/dist/run.js
