name: hivelore-sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # On push to main/master: sync anchors + auto-promote + commit changes
  sync-on-merge:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      # Build the CLI from this repo — the published package can lag the repo
      # (and did not exist at all during the @hiveai → @hivelore rename).
      - name: build hivelore from repo
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build
          echo "$(pwd)/scripts" >> "$GITHUB_PATH"
          mkdir -p scripts && printf '#!/bin/sh\nexec node "%s/packages/cli/dist/index.js" "$@"\n' "$(pwd)" > scripts/hivelore && chmod +x scripts/hivelore

      - name: refresh memory anchors + auto-promote
        run: hivelore sync --since HEAD~1 || true

      - name: commit updated memories (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .ai/
          git diff --cached --quiet || git commit -m "chore: hivelore sync [skip ci]"
          git push

  # On pull request: warn if PR touches files that would invalidate memories
  pr-stale-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      # Build the CLI from this repo — the published package can lag the repo
      # (and did not exist at all during the @hiveai → @hivelore rename).
      - name: build hivelore from repo
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build
          echo "$(pwd)/scripts" >> "$GITHUB_PATH"
          mkdir -p scripts && printf '#!/bin/sh\nexec node "%s/packages/cli/dist/index.js" "$@"\n' "$(pwd)" > scripts/hivelore && chmod +x scripts/hivelore

      - name: verify memory anchors touched by this PR
        id: verify
        run: |
          hivelore memory verify 2>&1 | tee /tmp/hivelore-verify.txt || true
          STALE=$(grep -c 'stale' /tmp/hivelore-verify.txt || echo 0)
          echo "stale_count=$STALE" >> "$GITHUB_OUTPUT"

      - name: comment on PR if stale memories detected
        if: steps.verify.outputs.stale_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/hivelore-verify.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### hivelore — Stale memories detected\n\nSome memories anchored to code modified in this PR may be outdated:\n\n\`\`\`\n${report}\n\`\`\`\n\nRun \`hivelore memory verify --update\` locally to refresh them before merging.`
            });

  # ── Hivelore PR Memory Check ─────────────────────────────────────────────────
  # Posts a comment on every PR surfacing memories relevant to the changed files.
  # Reviewers and AI agents see gotchas, conventions, and action_required items
  # before they start coding.
  pr-memory-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: Doucs91/hivelore/packages/github-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # post-if-empty: 'true'   # uncomment to always post (even when no memories found)
          # max-memories: '5'       # limit memories per file in the comment

  # On push to main: push shared memories to the hub (if hubPath is configured)
  # Uncomment and configure hubPath in .ai/hivelore.config.json to enable.
  # hub-push:
