name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Allow manual runs from the Actions tab (e.g. when the last push tip carried
  # [skip ci]). GitHub skips the WHOLE push's CI when the HEAD commit message
  # contains [skip ci] — so never let a sync/[skip ci] commit be a push tip that
  # also includes code. See the release-commit decision in .ai/memories.
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Verify build artifacts
        run: pnpm check:artifacts

      # Type-check BEFORE tests: tests import built dist, so a clean typecheck on a
      # fresh build catches the source/dist desync that otherwise only shows up as
      # confusing test failures. Blocking (no continue-on-error) so regressions fail CI.
      - name: Type-check
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm -r test
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      # Quality gate: Hivelore must keep surfacing the right memories/sensors.
      # Fails the build if briefing retrieval / sensor catch-rate regresses.
      - name: Hivelore eval (retrieval + sensor quality gate)
        run: node packages/cli/dist/index.js eval --regression-gate --fail-under 80 --fail-under-catch-rate 100
