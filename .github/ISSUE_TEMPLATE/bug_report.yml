name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: Hivelore version
      placeholder: "e.g. 0.9.11 (run: hivelore --version)"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "e.g. 20.11.0 (run: node --version)"
    validations:
      required: true

  - type: input
    id: ai-client
    attributes:
      label: AI client
      placeholder: "e.g. Claude Code 1.x, Cursor 0.x, VS Code Copilot"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `haive ...`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
