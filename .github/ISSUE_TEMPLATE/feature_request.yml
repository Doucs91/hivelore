name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "e.g. When I work on multi-repo setups, I can't share memories across repos without..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - MCP tools
        - Enforcement / gates
        - Memory schema
        - Semantic search / embeddings
        - VS Code extension
        - GitHub Action
        - Documentation
        - Other
    validations:
      required: true
